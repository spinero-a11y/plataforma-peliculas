<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SofVeria | Plataforma de Streaming</title>
    <!-- Iconos de Google para el buscador y menús -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN SUPERIOR -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo">Sof<span>Veria</span></div>
            <nav class="nav-menu">
                <a href="#" id="btn-inicio" class="active">Inicio</a>
                <a href="#" id="btn-recomendados">Recomendados</a>
                <a href="#">Mi Lista</a>
                <!-- Desplegable de Categorías -->
                <div class="dropdown">
                    <button class="dropbtn">Categorías <span class="material-symbols-outlined">expand_more</span></button>
                    <div class="dropdown-content" id="lista-categorias">
                        <!-- Las categorías se cargarán dinámicamente con JS o a mano -->
                        <a href="#">Acción</a>
                        <a href="#">Comedia</a>
                        <a href="#">Drama</a>
                        <a href="#">Terror</a>
                        <a href="#">Ciencia Ficción</a>
                    </div>
                </div>
            </nav>
        </div>

        <!-- BUSCADOR INTELIGENTE -->
        <div class="nav-right">
            <div class="search-box">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="input-busqueda" placeholder="Títulos, géneros, actores...">
            </div>
            <div class="user-profile">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuario">
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-layout">
        
        <section class="movie-section">
    <h2 class="section-title" id="titulo-principal">Recomendados para ti</h2>
    <div class="slider-wrapper">
        <button class="arrow-btn left-arrow" onclick="deslizar('contenedor-populares', 'izquierda')">&#10094;</button>
        <div id="contenedor-populares" class="movies-slider">
            </div>
        <button class="arrow-btn right-arrow" onclick="deslizar('contenedor-populares', 'derecha')">&#10095;</button>
    </div>
</section>

<section class="movie-section" id="seccion-tendencias">
    <h2 class="section-title">Tendencias de la semana</h2>
    <div class="slider-wrapper">
        <button class="arrow-btn left-arrow" onclick="deslizar('contenedor-tendencias', 'izquierda')">&#10094;</button>
        <div id="contenedor-tendencias" class="movies-slider">
            </div>
        <button class="arrow-btn right-arrow" onclick="deslizar('contenedor-tendencias', 'derecha')">&#10095;</button>
    </div>
</section>

    </main>

    <footer class="footer">
        <p>&copy; 2026 SofVeria. Diseñado para amantes del cine.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
